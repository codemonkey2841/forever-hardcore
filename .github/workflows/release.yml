name: Release

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          current=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          IFS='.' read -r major minor patch <<< "$current"
          bump="${{ github.event.inputs.bump || 'patch' }}"
          case "$bump" in
            major) new_version="$((major + 1)).0.0" ;;
            minor) new_version="$major.$((minor + 1)).0" ;;
            *)     new_version="$major.$minor.$((patch + 1))" ;;
          esac
          sed -i "s/^mod_version=.*/mod_version=$new_version/" gradle.properties
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Commit, tag, and push
        run: |
          git add gradle.properties
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        run: gh release create "v${{ steps.bump.outputs.version }}" build/libs/*.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
